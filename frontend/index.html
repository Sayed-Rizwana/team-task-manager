<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager | Login</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-page="auth">
  <main class="shell shell-auth">
    <section class="auth-panel">
      <div class="brand-block">
        <p class="eyebrow">Team Task Manager</p>
        <h1>Manage projects, assignments, and delivery in one place.</h1>
        <p class="lede">Sign in to continue or create an account to start organizing work across your team.</p>
      </div>

      <div class="card auth-card">
        <div class="tabs">
          <button class="tab-button active" data-auth-tab="login" type="button">Login</button>
          <button class="tab-button" data-auth-tab="signup" type="button">Sign Up</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            <span>Email</span>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </label>
          <button class="button button-primary" type="submit">Login</button>
        </form>

        <form id="signup-form" class="auth-form is-hidden">
          <label>
            <span>Full name</span>
            <input type="text" id="signup-name" placeholder="Your name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" id="signup-password" placeholder="Minimum 6 characters" required>
          </label>
          <label>
            <span>Role</span>
            <select id="signup-role">
              <option value="member">Member</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <button class="button button-primary" type="submit">Create account</button>
        </form>

        <p id="auth-message" class="form-message" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="/assets/js/app.js"></script>
</body>
</html>
