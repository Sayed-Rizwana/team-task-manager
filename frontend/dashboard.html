<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager | Dashboard</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-page="dashboard">
  <header class="topbar">
    <div>
      <p class="eyebrow">Team Task Manager</p>
      <h1 class="page-title">Dashboard</h1>
    </div>
    <div class="topbar-actions">
      <div class="user-chip">
        <span id="current-user-name">User</span>
        <span id="current-user-role" class="role-pill">member</span>
      </div>
      <button id="logout-button" class="button button-secondary" type="button">Logout</button>
    </div>
  </header>

  <nav class="nav-bar">
    <a class="nav-link active" href="/dashboard.html">Dashboard</a>
    <a class="nav-link" href="/projects.html">Projects</a>
    <a class="nav-link" href="/tasks.html">Tasks</a>
  </nav>

  <main class="shell">
    <section class="summary-grid">
      <article class="card stat-card">
        <p>Total Projects</p>
        <strong id="total-projects">0</strong>
      </article>
      <article class="card stat-card">
        <p>Total Tasks</p>
        <strong id="total-tasks">0</strong>
      </article>
      <article class="card stat-card">
        <p>Completed</p>
        <strong id="completed-tasks">0</strong>
      </article>
      <article class="card stat-card">
        <p>Pending</p>
        <strong id="pending-tasks">0</strong>
      </article>
      <article class="card stat-card">
        <p>In Progress</p>
        <strong id="in-progress-tasks">0</strong>
      </article>
      <article class="card stat-card stat-alert">
        <p>Overdue</p>
        <strong id="overdue-tasks">0</strong>
      </article>
    </section>

    <section class="content-grid">
      <article class="card">
        <div class="section-heading">
          <h2>Recent Tasks</h2>
          <a class="text-link" href="/tasks.html">Open tasks</a>
        </div>
        <div id="recent-tasks" class="stack-list"></div>
      </article>

      <article class="card">
        <div class="section-heading">
          <h2>Your Access</h2>
        </div>
        <div id="dashboard-role-message" class="info-panel"></div>
      </article>
    </section>
  </main>

  <script src="/assets/js/app.js"></script>
</body>
</html>
